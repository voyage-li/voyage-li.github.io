<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="icon" href="/images/icons/favicon-16x16.png?v=2.6.2" type="image/png" sizes="16x16">
    <link rel="icon" href="/images/icons/favicon-32x32.png?v=2.6.2" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/images/icons/apple-touch-icon.png?v=2.6.2" sizes="180x180">
    <link rel="mask-icon" href="/images/icons/stun-logo.svg?v=2.6.2" color="#54bcff">
    <meta name="msapplication-TileImage" content="/images/icons/favicon-144x144.png">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
    <meta name="renderer" content="webkit">
    <title>Love</title>

    <link rel="stylesheet" type="text/css" href="/ours/css/style.css" />


</head>

<body>


    <div class="container">
        <header class="header">
            <div class="blog-title">
                <a href="/ours" class="logo">Love</a>
            </div>
            <div class="blog-return">
                <a href="/" class="return">返回 </a>
            </div>
        </header>

        <main class="main">
            <section class="date">
                <div class="date">
                    <h2>
                        李远航 & 傻猫黄思琪 在一起
                    </h2>
                    <div class="timer">
                        <b id="d"></b> 天 <b id="h"></b> 小时 <b id="m"></b> 分钟 <b id="s"></b> 秒
                    </div>
                    <div class="song">
                        <!--页面底部歌词-->
                        <!-- require APlayer -->
                        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
                        <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
                        <!-- require MetingJS -->
                        <script src="https://cdn.jsdelivr.net/npm/meting@2.0.1/dist/Meting.min.js"></script>
                        <meting-js server="netease" type="song" id="22829933" fixed="true" loop="all" order="random"
                            preload="auto" autoplay="true" list-folded="ture" lrc-type="1" mutex="true">
                        </meting-js>
                    </div>
                </div>

                <!--计时器js-->
                <script>
                    function timer() {
                        window.setTimeout("timer()", 1000);
                        var start = new Date("2020-07-21 13:13:00");
                        var t = new Date().getTime() - start;
                        var h = ~~(t / 1000 / 60 / 60 % 24);
                        if (h < 10) { h = "0" + h; }
                        var m = ~~(t / 1000 / 60 % 60);
                        if (m < 10) { m = "0" + m; }
                        var s = ~~(t / 1000 % 60);
                        if (s < 10) { s = "0" + s; }
                        document.getElementById('d').innerHTML = ~~(t / 1000 / 60 / 60 / 24);
                        document.getElementById('h').innerHTML = h;
                        document.getElementById('m').innerHTML = m;
                        document.getElementById('s').innerHTML = s;
                    }
                    timer();
                </script>
                <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
                <script src="/ours/js/sakura.js"></script>
                <script src="https://cdn.jsdelivr.net/gh/wallleap/cdn/js/love.js"></script>
            </section>
        </main>
    </div>

    <div class="magicbox">
        <div class="item front"><img src="/ours/image/1.jpg" width="100%" alt=""></div>
        <div class="item back"><img src="/ours/image/2.jpg" width="100%" alt=""></div>
        <div class="item left"><img src="/ours/image/3.jpg" width="100%" alt=""></div>
        <div class="item right"><img src="/ours/image/4.jpg" width="100%" alt=""></div>
        <div class="item top"><img src="/ours/image/5.jpg" width="100%" alt=""></div>
        <div class="item bottom"><img src="/ours/image/6.jpg" width="100%" alt=""></div>
    </div>
</body>

</html>
