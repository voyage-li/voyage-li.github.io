    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script>
        $(function() {
            $.fn.Cherry_Blossoms=function (params) {
                return this.each(function () {
                    //设置默认值
                    var defaults={
                        ele:'.cherry',//切换对象
                        is_Cherry:true,//是否生成樱花
                        image_min:10,//花瓣最小宽度和高度
                        image_max:50,//花瓣最大宽度和高度
                        time_min:5000,//花瓣最快下坠时间
                        time_max:10000,//花瓣最慢下坠时间
                        interval:100//花瓣生成时间间隔
                    };
                    //定义默认参数，其中若在html页面设置了param是，这里的params会替换defaults
                    var par = $.extend({}, defaults, params);
                    /**
                     * [m,n]随机数函数
                     */
                    function randomNum(minNum, maxNum) {
                        switch (arguments.length) {
                            case 1:
                                return parseInt(Math.random() * minNum + 1, 10);
                                break;
                            case 2:
                                return parseInt(Math.random() * (maxNum - minNum + 1) + minNum, 10);
                                break;
                            default:
                                return 0;
                                break;
                        }
                    }
                
                    /**
                     * 生成樱花花瓣
                     */
                    if(par.is_Cherry) {
                        setInterval(function () {
                            var time;//下落的持续时间，取随机数
                            var image_size;//花瓣大小取随机数
                            var margin_left;//花瓣所在位置，取随机数
                            margin_left = randomNum(5, 100);
                            time = randomNum(par.time_min, par.time_max);
                            console.log(time);
                            image_size = randomNum(par.image_min, par.image_max);
                            console.log(image_size);
                            $('#sakura:last-child').after('<img id="sakura" src="/image/sakura.png" alt="">');
                            $('#sakura:last-child').css({
                                'margin-left': margin_left + '%',
                                'width': image_size + 'px',
                                'height': image_size + 'px'
                            });
                            $('#sakura:last-child').animate({
                                    left: -15 + '%',
                                    top: 100 + '%',
                                    deg: -540
                                },
                                {
                                    step: function (deg) {
                                        //console.log(deg);
                                        $(this).css({"transform": "rotate3d(1,.2,0," + deg + "deg)"});
                                    },
                                    duration: time
                                }, time);
                            setTimeout(function () {
                                $('#sakura:first-child').remove();
                            }, time);
                        }, par.interval);
                    }
                })
            }
        });

    </script>

    <meta name="generator" content="Hexo 6.0.0">

<body>
    <div class="cherry">
    <img id="sakura" src="/image/sakura.png" alt="" >

    <script>
        $(function(){
            $('.cherry').Cherry_Blossoms({

                time_max:20000,//花瓣最慢下坠时间
                interval:500//花瓣生成时间间隔
            })
        })
    </script>

            </div>
        </header>

        <main class="main">
            <section class="date">
                <div class="date">
                    <h2>
                        李远航 & 黄思琪 在一起已经
                    </h2>
                    <div class="timer">
                        <b id="d"></b> 天 <b id="h"></b> 小时 <b id="m"></b> 分钟 <b id="s"></b> 秒
                    </div>
                    <div class="song">
                        <!--页面底部歌词-->
                        <!-- require APlayer -->
                        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
                        <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
                        <!-- require MetingJS -->
                        <script src="https://cdn.jsdelivr.net/npm/meting@2.0.1/dist/Meting.min.js"></script>
                        <meting-js 
                            server="netease" 
                            type="song" 
                            id="22829933"
                            fixed="true"
	                        loop="all"
	                        order="random"
	                        preload="auto"
                            autoplay="true"
	                        list-folded="ture"
	                        lrc-type="1"
	                        mutex="true">
                        </meting-js>
                    </div>
                </div>

                <!--计时器js-->
                <script>
                    function timer() {
                        window.setTimeout("timer()", 1000);
                        var start = new Date("2020-07-21 13:13:00");
                        var t = new Date().getTime() - start;
                        var h = ~~(t / 1000 / 60 / 60 % 24);
                        if (h < 10) { h = "0" + h; }
                        var m = ~~(t / 1000 / 60 % 60);
                        if (m < 10) { m = "0" + m; }
                        var s = ~~(t / 1000 % 60);
                        if (s < 10) { s = "0" + s; }
                        document.getElementById('d').innerHTML = ~~(t / 1000 / 60 / 60 / 24);
                        document.getElementById('h').innerHTML = h;
                        document.getElementById('m').innerHTML = m;
                        document.getElementById('s').innerHTML = s;
                    }
                    timer();
                </script>
                <script src="https://cdn.jsdelivr.net/gh/wallleap/cdn/js/love.js"></script>
            </section>
